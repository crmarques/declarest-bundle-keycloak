apiVersion: declarest.io/v1alpha1
kind: MetadataBundle

name: keycloak-bundle
# Placeholder only. The release workflow stamps the real version into the published bundle.yaml.
version: 0.0.0
description: Metadata bundle for Keycloak Admin REST API.
home: https://github.com/crmarques/declarest-bundle-keycloak
sources:
  - https://github.com/crmarques/declarest-bundle-keycloak
  - https://www.keycloak.org/docs-api/26.4.7/rest-api/openapi.yaml
keywords:
  - declarest
  - keycloak
  - metadata
license: Apache-2.0
deprecated: false

maintainers:
  - name: Carlos Marques
    url: https://github.com/crmarques

declarest:
  shorthand: keycloak-bundle
  metadataRoot: metadata
  openapi: openapi.yaml
  metadataFileName: metadata.yaml
  compatibleDeclarest: ">=0.1.0"
  compatibleManagedServer:
    product: keycloak
    versions: ">=26.0.0 <27.0.0"

distribution:
  repo: crmarques/declarest-bundle-keycloak
  tagTemplate: "v{version}"
  artifactTemplate: "keycloak-bundle-{version}.tar.gz"

annotations:
  org.opencontainers.image.source: https://github.com/crmarques/declarest-bundle-keycloak
